name: Auto Commit
on:
  schedule:
    - cron: "0 * * * *"
permissions:
  contents: write
jobs:
  commit-user1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto Commit Loop - User 1
        run: |
          set -e
          FILE="files/$USERNAME/README.md"
          COMMIT_LOOP_COUNT=$FREQUENCY

          echo "Configuring Git..."
          git config --global user.name "$USERNAME"
          git config --global user.email "$EMAIL"

          do_commit_loop() {
            for ((i=1; i<=COMMIT_LOOP_COUNT; i++)); do
              if [ ! -f "$FILE" ]; then
                mkdir -p "$(dirname "$FILE")"
                echo "# Git Auto Commit | User 1" > "$FILE"
                echo "This file was added $(date +"%b %d, %Y")" >> "$FILE"
                echo "" >> "$FILE"
                echo "Just for fun and keeping my daily git commit active 🤪" >> "$FILE"
                echo "" >> "$FILE"
                echo "commit number: 1" >> "$FILE"
                CURRENT=1
              else
                CURRENT=$(grep -oP 'commit number: \K\d+' "$FILE" || echo "0")
                NEXT=$((CURRENT + 1))
                sed -i "/commit number: /c\commit number: $NEXT" "$FILE"
                CURRENT=$NEXT
              fi

              SUCCESS=false
              for attempt in 1 2 3; do
                if git add "$FILE" && git commit -m "Auto commit #$CURRENT : target - ($FILE)"; then
                  SUCCESS=true
                  break
                fi
                echo "Commit attempt $attempt failed, retrying in 2s..."
                git rm --cached "$FILE" 2>/dev/null || true
                sleep 2
              done

              if [ "$SUCCESS" = false ]; then
                echo "Failed to commit after 3 attempts, skipping iteration $i"
                continue
              fi

              echo "Committed #$CURRENT"
            done
          }

          do_commit_loop

          echo "Pushing commits..."
          PUSHED=false
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Push succeeded."
              PUSHED=true
              break
            fi

            echo "Push attempt $attempt failed."

            if [ "$attempt" -lt 3 ]; then
              echo "Fetching fresh origin/main and rebuilding commits on top of it..."
              echo "(Avoids the shallow-unshallow/rebase failure when weekly_squash.yml has rewritten history.)"
              git fetch origin main --depth=1
              git reset --hard origin/main
              do_commit_loop
              sleep 3
            fi
          done

          if [ "$PUSHED" = false ]; then
            echo "::error::Failed to push after 3 attempts."
            exit 1
          fi

          echo "Done!"
        shell: bash
        env:
          USERNAME: ${{ secrets.USERNAME }}
          EMAIL: ${{ secrets.EMAIL }}
          FREQUENCY: ${{ secrets.FREQUENCY }}
