name: Auto Commit
on:
  schedule:
    - cron: "0 * * * *"
permissions:
  contents: write
jobs:
  commit-user1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto Commit Loop - User 1
        run: |
          set -e
          FILE="files/$USERNAME/README.md"
          COMMIT_LOOP_COUNT=$FREQUENCY

          echo "Configuring Git..."
          git config --global user.name "$USERNAME"
          git config --global user.email "$EMAIL"

          for ((i=1; i<=COMMIT_LOOP_COUNT; i++)); do
            if [ ! -f "$FILE" ]; then
              mkdir -p "$(dirname $FILE)"
              echo "# Git Auto Commit | User 1" > "$FILE"
              echo "This file was added $(date +"%b %d, %Y")" >> "$FILE"
              echo "" >> "$FILE"
              echo "Just for fun and keeping my daily git commit active 🤪" >> "$FILE"
              echo "" >> "$FILE"
              echo "commit number: 1" >> "$FILE"
              CURRENT=1
            else
              CURRENT=$(grep -oP 'commit number: \K\d+' "$FILE" || echo "0")
              NEXT=$((CURRENT + 1))
              sed -i "/commit number: /c\commit number: $NEXT" "$FILE"
              CURRENT=$NEXT
            fi

            SUCCESS=false
            for attempt in 1 2 3; do
              if git add "$FILE" && git commit -m "Auto commit #$CURRENT : target - ($FILE)"; then
                SUCCESS=true
                break
              fi
              echo "Attempt $attempt failed, retrying in 2s..."
              git rm --cached "$FILE" 2>/dev/null || true
              sleep 2
            done

            if [ "$SUCCESS" = false ]; then
              echo "Failed to commit after 3 attempts, skipping iteration $i"
              continue
            fi

            echo "Committed #$CURRENT"
          done

          echo "Pushing commits..."
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Push succeeded."
              break
            fi
            echo "Push attempt $attempt failed, fetching and retrying..."
            git fetch --unshallow origin main 2>/dev/null || git fetch origin main
            git rebase origin/main
            sleep 3
          done

          echo "Done!"
        shell: bash
        env:
          USERNAME: ${{ secrets.USERNAME }}
          EMAIL: ${{ secrets.EMAIL }}
          FREQUENCY: ${{ secrets.FREQUENCY }}
